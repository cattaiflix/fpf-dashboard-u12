<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard FPF — Classificação SUB12</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --fpf-blue:#0A2D6E;--fpf-blue2:#1344A0;--fpf-light:#3B6FD4;--fpf-white:#fff;
  --verde1:rgba(15,110,86,.18);--verde2:rgba(15,110,86,.10);--verde3:rgba(15,110,86,.05);
  --azul:rgba(19,68,160,.13);--amber:rgba(186,117,23,.10);
  --fundo:#f0f4fa;--card:#fff;--borda:#dbe4f0;--texto:#0d1b3e;--muted:#5a6e94;
  --accent:#1344A0;--verde:#0F6E56;--red:#993C1D;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--fundo);color:var(--texto);min-height:100vh;padding:0 0 3rem}

.site-header{background:linear-gradient(135deg,#0A2D6E 0%,#1344A0 60%,#1B55C0 100%);padding:.85rem 1.5rem;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(10,45,110,.35)}
.site-header .fpf-logo{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;border:2px solid rgba(255,255,255,.25)}
.site-header h1{font-size:16px;font-weight:700;color:#fff;letter-spacing:.01em}
.site-header p{font-size:11px;color:rgba(255,255,255,.65);margin-top:1px}
.badge-ao-vivo{margin-left:auto;background:rgba(255,255,255,.12);color:#fff;font-size:11px;font-weight:600;padding:4px 11px;border-radius:999px;border:1px solid rgba(255,255,255,.25);display:flex;align-items:center;gap:5px;white-space:nowrap}
.badge-ao-vivo::before{content:'';width:7px;height:7px;background:#4ade80;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

.tabs{background:var(--fpf-blue);display:flex;gap:0;padding:0 1.5rem}
.tab{padding:11px 20px;font-size:13px;font-weight:500;color:rgba(255,255,255,.55);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap}
.tab.active{color:#fff;border-bottom-color:#4ade80}
.tab:hover:not(.active){color:rgba(255,255,255,.85)}

.container{max-width:980px;margin:0 auto;padding:1.5rem 1rem}

.search-wrap{position:relative;margin-bottom:1.5rem}
.search-wrap input{width:100%;padding:11px 16px 11px 42px;border:1.5px solid var(--borda);border-radius:12px;background:var(--card);font-size:15px;color:var(--texto);outline:none;transition:all .15s;box-shadow:0 1px 4px rgba(10,45,110,.06)}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(19,68,160,.1)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:18px;pointer-events:none}
.dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--card);border:1px solid var(--borda);border-radius:10px;max-height:240px;overflow-y:auto;z-index:100;display:none;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.dropdown.open{display:block}
.dd-item{padding:10px 16px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--borda);display:flex;justify-content:space-between;align-items:center}
.dd-item:last-child{border-bottom:none}
.dd-item:hover{background:var(--fundo)}
.dd-item span{font-size:12px;color:var(--muted)}

.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:1.25rem}
.metric{background:var(--card);border:1.5px solid var(--borda);border-radius:12px;padding:10px 12px;box-shadow:0 1px 4px rgba(10,45,110,.06);transition:box-shadow .15s}
.metric:hover{box-shadow:0 3px 10px rgba(10,45,110,.1)}
.metric-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:700;color:var(--texto)}
.metric-value.blue{color:var(--accent)}
.metric-value.green{color:var(--verde)}
.metric-value.red{color:var(--red)}
.time-tag{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(90deg,#0A2D6E,#1344A0);color:#fff;font-size:13px;font-weight:600;padding:6px 14px;border-radius:8px;margin-bottom:1rem}
.status-badge{font-size:13px;color:var(--muted);margin-bottom:1.25rem}

.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--muted);margin-bottom:1.25rem;padding:10px 14px;background:var(--card);border:1px solid var(--borda);border-radius:10px}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}

.group-label{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin:1.25rem 0 .5rem;padding-bottom:6px;border-bottom:2px solid var(--accent);display:inline-block}
.outros-sep{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin:2rem 0 .5rem;padding:1rem 0 .5rem;border-top:2px solid var(--borda);border-bottom:1px solid var(--borda)}

.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--borda);margin-bottom:.5rem;background:var(--card)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#e8eef8;padding:8px 10px;text-align:center;font-size:11px;font-weight:700;color:var(--accent);white-space:nowrap;letter-spacing:.03em}
thead th:nth-child(2){text-align:left;min-width:150px}
thead th:first-child{width:32px}
tbody td{padding:8px 10px;text-align:center;border-top:1px solid var(--borda);white-space:nowrap}
tbody td:first-child{font-weight:600;color:var(--muted);font-size:12px}
tbody td:nth-child(2){text-align:left;font-weight:600}
tr.c1{background:var(--verde1)}
tr.c2{background:var(--verde2)}
tr.c3{background:var(--verde3)}
tr.c4a{background:var(--azul)}
tr.c4b{background:var(--amber)}
tr.destaque td:nth-child(2){color:var(--accent)}
tr.destaque td:first-child::before{content:"▶ ";color:var(--accent);font-size:9px}

.mm-intro{font-size:13px;color:var(--muted);margin-bottom:1.25rem;padding:10px 14px;background:var(--card);border:1px solid var(--borda);border-radius:10px;line-height:1.6}
.mm-section-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:1.5rem 0 .75rem;padding-bottom:6px;border-bottom:1px solid var(--borda)}
.chaves-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:1rem}
.chave-card{background:var(--card);border:1px solid var(--borda);border-radius:10px;overflow:hidden}
.chave-header{background:linear-gradient(90deg,#0A2D6E,#1344A0);padding:8px 14px;font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.06em;border-bottom:none}
.chave-time{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--borda)}
.chave-time:last-child{border-bottom:none}
.chave-pos{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0}
.pos-1{background:rgba(15,110,86,.15);color:#0F6E56}
.pos-2{background:rgba(24,95,165,.12);color:#185FA5}
.pos-3{background:rgba(186,117,23,.15);color:#854F0B}
.pos-4a{background:rgba(24,95,165,.12);color:#185FA5}
.chave-nome{font-size:13px;font-weight:600;flex:1}
.chave-pts{font-size:12px;color:var(--muted);white-space:nowrap}
.chave-vs{text-align:center;font-size:11px;color:var(--muted);padding:4px;background:var(--fundo);border-top:1px solid var(--borda);border-bottom:1px solid var(--borda);font-weight:600;letter-spacing:.05em}
.pendente{opacity:.45;font-style:italic}

.rodadas-nav{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem}
.rodada-btn{padding:6px 13px;font-size:12px;font-weight:600;border-radius:8px;border:1.5px solid var(--borda);background:var(--card);color:var(--muted);cursor:pointer;transition:all .15s}
.rodada-btn:hover{border-color:var(--accent);color:var(--accent)}
.rodada-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.rodada-btn.futura{border-style:dashed;opacity:.65}
.rodada-titulo{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin:1.25rem 0 .6rem;padding-bottom:6px;border-bottom:2px solid var(--accent);display:inline-block}
.jogos-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.jogo-card{background:var(--card);border:1.5px solid var(--borda);border-radius:12px;overflow:hidden;transition:box-shadow .15s}
.jogo-card:hover{box-shadow:0 3px 12px rgba(10,45,110,.1)}
.jogo-card.destaque-jogo{border-color:var(--accent);box-shadow:0 0 0 2px rgba(19,68,160,.15)}
.jogo-header{background:#e8eef8;padding:5px 14px;font-size:10px;font-weight:700;color:var(--accent);display:flex;justify-content:space-between;letter-spacing:.04em}
.jogo-body{display:flex;align-items:center;padding:10px 14px;gap:10px}
.jogo-time{display:flex;align-items:center;gap:8px;flex:1}
.jogo-time.visitante{flex-direction:row-reverse;text-align:right}
.jogo-escudo{width:32px;height:32px;object-fit:contain;flex-shrink:0}
.jogo-nome{font-size:13px;font-weight:700;color:var(--texto)}
.jogo-placar{display:flex;align-items:center;gap:6px;flex-shrink:0}
.placar-num{font-size:22px;font-weight:800;color:var(--texto);min-width:28px;text-align:center;line-height:1}
.placar-x{font-size:13px;color:var(--muted);font-weight:600}
.placar-vazio{font-size:11px;color:var(--muted);padding:4px 10px;background:var(--fundo);border-radius:6px;border:1px solid var(--borda);white-space:nowrap}
.jogo-info{font-size:10px;color:var(--muted);padding:4px 14px 7px;display:flex;gap:10px;flex-wrap:wrap}
.badge-futuro{display:inline-block;background:rgba(186,117,23,.1);color:#854F0B;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;border:1px solid rgba(186,117,23,.2)}
.badge-passado{display:inline-block;background:rgba(15,110,86,.1);color:#0F6E56;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;border:1px solid rgba(15,110,86,.2)}
.jogos-filtro-info{font-size:12px;color:var(--muted);margin-bottom:1rem;padding:8px 12px;background:var(--card);border:1px solid var(--borda);border-radius:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}

.busca-jogos-wrap{position:relative;margin-bottom:1.25rem;width:100%}
.busca-jogos-wrap input{display:block;width:100%;padding:10px 16px 10px 40px;border:1.5px solid var(--borda);border-radius:12px;background:var(--card);font-size:14px;color:var(--texto);outline:none;transition:all .15s;box-shadow:0 1px 4px rgba(10,45,110,.06);box-sizing:border-box}
.busca-jogos-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(19,68,160,.1)}
.busca-jogos-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none;line-height:1}
.busca-jogos-dd{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--card);border:1.5px solid var(--borda);border-radius:10px;max-height:220px;overflow-y:auto;z-index:200;display:none;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.busca-jogos-dd.open{display:block}

.loading,.erro{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:15px}
.erro{color:var(--red)}
.spinner{width:28px;height:28px;border:3px solid var(--borda);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.footer-note{font-size:11px;color:var(--muted);text-align:right;margin-top:1rem}
.footer-bar{background:linear-gradient(135deg,#0A2D6E 0%,#1344A0 100%);margin-top:3rem;padding:1.1rem 1.5rem;display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;color:rgba(255,255,255,.6)}
.footer-bar strong{color:#fff;font-weight:600}

@media (max-width:600px){
  .site-header h1{font-size:14px}
  .metric-value{font-size:18px}
  .tabs{overflow-x:auto}
}
</style>
</head>

    <p id="subtitulo">Dados da Federação Paulista de Futebol</p>
  </div>
  <div class="badge-ao-vivo">Ao vivo</div>
</header>

<nav class="tabs">
  <div class="tab active" onclick="trocarAba('classificacao', this)">Classificação</div>
  <div class="tab" onclick="trocarAba('jogos', this)">Jogos / Rodadas</div>
  <div class="tab" onclick="trocarAba('ranking', this)">Ranking Geral</div>
  <div class="tab" onclick="trocarAba('quartos', this)">Ranking 4ºs</div>
  <div class="tab" onclick="trocarAba('matamata', this)">Previsão 2ª Fase</div>

<div class="container">

  <div id="aba-classificacao">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="busca" placeholder="Buscar time..." autocomplete="off" disabled>
      <div class="dropdown" id="dropdown"></div>
    </div>
    <div id="app">
      <div class="loading"><div class="spinner"></div>Buscando dados da FPF...</div>
    </div>
  </div>

  <div id="aba-jogos" style="display:none">
    <div class="busca-jogos-wrap">
      <span class="busca-jogos-icon">🔍</span>
      <input type="text" id="busca-jogos" placeholder="Filtrar por time nos jogos..." autocomplete="off">
      <div class="busca-jogos-dd" id="dropdown-jogos"></div>
    </div>
    <div id="jogos-content">
      <div class="loading"><div class="spinner"></div>Buscando jogos...</div>
    </div>
  </div>

  <div id="aba-ranking" style="display:none">
    <div id="ranking-content"><div class="loading"><div class="spinner"></div>Aguardando dados...</div></div>
  </div>

  <div id="aba-quartos" style="display:none">
    <div id="quartos-content"><div class="loading"><div class="spinner"></div>Aguardando dados...</div></div>
  </div>

  <div id="aba-matamata" style="display:none">
    <div id="mm-content">
      <div class="loading"><div class="spinner"></div>Aguardando dados...</div>
    </div>
  </div>

</div>

<footer class="footer-bar">
  <span>⚽ Dashboard FPF</span>
  <span style="color:var(--borda)">|</span>
  <span>Desenvolvido por <strong>CMRM IT Solutions</strong></span>
</footer>

<script>
const ENDPOINT = 'https://jolly-scene-789b.cattaiflix.workers.dev/';

let grupos = [];
let todosOsTimes = [];
let clubeSelecionado = null;
let abaAtual = 'classificacao';
var dadosJogos = null;
var rodadaAtiva = null;
var modoTodasRodadas = false;
var timeFiltroJogos = null;
var escudosMap = {};

/* ─── CHAVEAMENTO 2ª FASE ─── */
const CHAVEAMENTO = [
  { id:'G11', nome:'Grupo 11', times:[ {origem:'01',pos:1}, {origem:'10',pos:3} ] },
  { id:'G12', nome:'Grupo 12', times:[ {origem:'02',pos:1}, {origem:'09',pos:3} ] },
  { id:'G13', nome:'Grupo 13', times:[ {origem:'03',pos:1}, {origem:'08',pos:3} ] },
  { id:'G14', nome:'Grupo 14', times:[ {origem:'04',pos:1}, {origem:'07',pos:3} ] },
  { id:'G15', nome:'Grupo 15', times:[ {origem:'05',pos:1}, {origem:'06',pos:3} ] },
  { id:'G16', nome:'Grupo 16', times:[ {origem:'06',pos:1}, {origem:'05',pos:3} ] },
  { id:'G17', nome:'Grupo 17', times:[ {origem:'07',pos:1}, {origem:'04',pos:3} ] },
  { id:'G18', nome:'Grupo 18', times:[ {origem:'08',pos:1}, {origem:'03',pos:3} ] },
  { id:'G19', nome:'Grupo 19', times:[ {origem:'09',pos:1}, {origem:'02',pos:3} ] },
  { id:'G20', nome:'Grupo 20', times:[ {origem:'10',pos:1}, {origem:'01',pos:3} ] },
  { id:'G21', nome:'Grupo 21', times:[ {origem:'01',pos:2}, {origem:'07',pos:2} ] },
  { id:'G22', nome:'Grupo 22', times:[ {origem:'02',pos:2}, {origem:'08',pos:2} ] },
  { id:'G23', nome:'Grupo 23', times:[ {origem:'03',pos:2}, {origem:'09',pos:2} ] },
  { id:'G24', nome:'Grupo 24', times:[ {origem:'04',pos:2}, {origem:'10',pos:2} ] },
  { id:'G25', nome:'Grupo 25', times:[ {origem:'05',pos:2}, {origem:null,pos:'m4a'} ] },
  { id:'G26', nome:'Grupo 26', times:[ {origem:'06',pos:2}, {origem:null,pos:'m4b'} ] },
];

function parseGrupos(retorno) {
  const map = {};
  retorno.forEach(t => {
    const g = t.NomeGrupo.padStart(2,'0');
    if (!map[g]) map[g] = [];
    map[g].push(t);
  });
  return Object.entries(map)
    .sort(([a],[b]) => a.localeCompare(b))
    .map(([nome, times]) => ({
      nome: 'Grupo ' + nome,
      id: nome,
      times: times.sort((a,b) => a.Classificacao - b.Classificacao)
    }));
}

function getTop2dos4os() {
  const quartos = grupos.map(g => g.times[3]).filter(Boolean);
  return [...quartos]
    .sort((a,b) => b.Pontos-a.Pontos || b.SaldoGols-a.SaldoGols || b.GolsPro-a.GolsPro)
    .slice(0,2);
}

function getTime(grupoId, posicao) {
  const g = grupos.find(x => x.id === grupoId);
  if (!g) return null;
  return g.times[posicao - 1] || null;
}

function sg(n) { return (n >= 0 ? '+' : '') + n; }

function rowClass(pos, idClube, top2ids) {
  if (pos===1) return 'c1';
  if (pos===2) return 'c2';
  if (pos===3) return 'c3';
  if (pos===4) return top2ids.includes(idClube) ? 'c4a' : 'c4b';
  return '';
}

function getEscudo(nomeClube) {
  return escudosMap['nome_' + nomeClube] || null;
}

function buildTabela(grupo, destaque, top2ids) {
  const rows = grupo.times.map(t => {
    const rc = rowClass(t.Classificacao, t.IdClube, top2ids);
    const sel = destaque===t.IdClube ? ' destaque' : '';
    const esc = getEscudo(t.NomePopularClube);
    const escImg = esc ? `<img src="${esc}" style="width:20px;height:20px;object-fit:contain;margin-right:6px;vertical-align:middle;border-radius:2px" onerror="this.style.display='none'" alt="">` : '';
    return `<tr class="${rc}${sel}">
      <td>${t.Classificacao}</td>
      <td title="${t.NomePopularClube}">${escImg}${t.NomePopularClube}</td>
      <td><strong>${t.Pontos}</strong></td>
      <td>${t.NumeroPartidas}</td>
      <td>${t.Vitorias}</td><td>${t.Empates}</td><td>${t.Derrota}</td>
      <td>${t.GolsPro}</td><td>${t.GolsContra}</td><td>${sg(t.SaldoGols)}</td>
      <td>${t.VitoriasPenaltis}</td><td>${t.CartoesAmarelos}</td><td>${t.CartoesVermelhos}</td>
    </tr>`;
  }).join('');
  return `<div class="group-label">${grupo.nome}</div>
  <div class="table-wrap"><table>
    <thead><tr>
      <th>#</th><th>Time</th>
      <th title="Pontos">P</th><th title="Jogos">J</th>
      <th title="Vitórias">V</th><th title="Empates">E</th><th title="Derrotas">D</th>
      <th title="Gols Pró">GP</th><th title="Gols Contra">GC</th><th title="Saldo">SG</th>
      <th title="Vitórias Pênalti">VP</th><th title="C. Amarelo">CA</th><th title="C. Vermelho">CV</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function buildMetrics(t, gNome, top2ids) {
  const sgv = sg(t.SaldoGols);
  const sgc = t.SaldoGols>=0?'green':'red';
  const pos = t.Classificacao;
  const isTop2 = top2ids.includes(t.IdClube);
  const status =
    pos<=3 ? '🟢 Classificado direto para a 2ª fase' :
    pos===4&&isTop2 ? '🔵 2º melhor 4º colocado — classificado para a 2ª fase' :
    pos===4 ? '🟡 4º colocado — fora do top 2 no momento' : '⚪ Em disputa';
  return `<div class="time-tag">📌 ${gNome} · ${t.NomePopularClube} · ${pos}º lugar</div>
  <div class="metrics-grid">
    <div class="metric"><div class="metric-label">Posição</div><div class="metric-value blue">${pos}º</div></div>
    <div class="metric"><div class="metric-label">Pontos</div><div class="metric-value">${t.Pontos}</div></div>
    <div class="metric"><div class="metric-label">Jogos</div><div class="metric-value">${t.NumeroPartidas}</div></div>
    <div class="metric"><div class="metric-label">Vitórias</div><div class="metric-value green">${t.Vitorias}</div></div>
    <div class="metric"><div class="metric-label">Empates</div><div class="metric-value">${t.Empates}</div></div>
    <div class="metric"><div class="metric-label">Derrotas</div><div class="metric-value red">${t.Derrota}</div></div>
    <div class="metric"><div class="metric-label">Gols Pró</div><div class="metric-value">${t.GolsPro}</div></div>
    <div class="metric"><div class="metric-label">Gols Contra</div><div class="metric-value">${t.GolsContra}</div></div>
    <div class="metric"><div class="metric-label">Saldo</div><div class="metric-value ${sgc}">${sgv}</div></div>
    <div class="metric"><div class="metric-label">Vit. Pênalti</div><div class="metric-value">${t.VitoriasPenaltis}</div></div>
    <div class="metric"><div class="metric-label">C. Amarelos</div><div class="metric-value">${t.CartoesAmarelos}</div></div>
    <div class="metric"><div class="metric-label">C. Vermelhos</div><div class="metric-value">${t.CartoesVermelhos}</div></div>
  </div>
  <div class="status-badge">${status}</div>`;
}

function buildChaveCard(chave, top2) {
  const linhas = chave.times.map((slot, idx) => {
    let time = null;
    let posLabel = '';
    let posCls = '';

    if (slot.pos === 'm4a') {
      time = top2[0] || null;
      posLabel = '1º melhor 4º';
      posCls = 'pos-4a';
    } else if (slot.pos === 'm4b') {
      time = top2[1] || null;
      posLabel = '2º melhor 4º';
      posCls = 'pos-4a';
    } else {
      time = getTime(slot.origem, slot.pos);
      posLabel = `${slot.pos}º G${slot.origem}`;
      posCls = slot.pos===1?'pos-1':slot.pos===2?'pos-2':'pos-3';
    }

    const pendente = !time;
    const escudo = time ? getEscudo(time.NomePopularClube) : null;
    const escImg = escudo ? `<img src="${escudo}" style="width:22px;height:22px;object-fit:contain;flex-shrink:0;border-radius:2px" onerror="this.style.display='none'" alt="">` : '<span style="width:22px;display:inline-block"></span>';
    return `<div class="chave-time${pendente?' pendente':''}">
      <span class="chave-pos ${posCls}">${posLabel}</span>
      ${escImg}
      <span class="chave-nome">${time ? time.NomePopularClube : '—'}</span>
      ${time ? `<span class="chave-pts">${time.Pontos}pts</span>` : ''}
    </div>
    ${idx===0 ? '<div class="chave-vs">× VS ×</div>' : ''}`;
  }).join('');

  return `<div class="chave-card">
    <div class="chave-header">${chave.nome}</div>
    ${linhas}
  </div>`;
}

function renderMataMata() {
  const top2 = getTop2dos4os();
  const upd = grupos[0]?.times[0]?.UltimaSincronizacao?.replace('T',' ').slice(0,16)||'';

  const g1a10  = CHAVEAMENTO.slice(0,10);
  const g21a26 = CHAVEAMENTO.slice(10);

  let html = `<div class="mm-intro">
    Previsão da 2ª fase montada com base na classificação atual da 1ª fase.
    Os confrontos seguem o regulamento oficial da FPF:
    <strong>Grupos 11–20</strong> reúnem os 1ºs e 3ºs colocados de cada grupo;
    <strong>Grupos 21–26</strong> reúnem os 2ºs colocados e os 2 melhores 4ºs.
    Atualiza automaticamente a cada carregamento.
  </div>`;

  html += `<div class="mm-section-title">Grupos 11 a 20 — 1ºs e 3ºs colocados</div>`;
  html += `<div class="chaves-grid">`;
  g1a10.forEach(c => { html += buildChaveCard(c, top2); });
  html += `</div>`;

  html += `<div class="mm-section-title">Grupos 21 a 26 — 2ºs colocados + melhores 4ºs</div>`;
  html += `<div class="chaves-grid">`;
  g21a26.forEach(c => { html += buildChaveCard(c, top2); });
  html += `</div>`;

  html += `<div class="footer-note">Fonte: FPF · Última atualização: ${upd}</div>`;
  document.getElementById('mm-content').innerHTML = html;
}

const LEGENDA = `<div class="legend">
  <div class="legend-item"><span class="legend-dot" style="background:rgba(15,110,86,.5)"></span>1º — classificado</div>
  <div class="legend-item"><span class="legend-dot" style="background:rgba(15,110,86,.3)"></span>2º — classificado</div>
  <div class="legend-item"><span class="legend-dot" style="background:rgba(15,110,86,.14)"></span>3º — classificado</div>
  <div class="legend-item"><span class="legend-dot" style="background:rgba(24,95,165,.3)"></span>4º (top 2 entre grupos) — classificado</div>
  <div class="legend-item"><span class="legend-dot" style="background:rgba(186,117,23,.25)"></span>4º (fora do top 2)</div>
</div>`;

function renderClassificacao() {
  const top2 = getTop2dos4os().map(t=>t.IdClube);
  const app = document.getElementById('app');
  const upd = grupos[0]?.times[0]?.UltimaSincronizacao?.replace('T',' ').slice(0,16)||'';
  let html = LEGENDA;

  if (clubeSelecionado !== null) {
    let gSel=null, tSel=null;
    for (const g of grupos) {
      const t = g.times.find(x=>x.IdClube===clubeSelecionado);
      if (t) { gSel=g; tSel=t; break; }
    }
    if (tSel) {
      html += buildMetrics(tSel, gSel.nome, top2);
      html += buildTabela(gSel, clubeSelecionado, top2);
      const outros = grupos.filter(g=>g.nome!==gSel.nome);
      if (outros.length) {
        html += `<div class="outros-sep">Outros grupos</div>`;
        outros.forEach(g => { html += buildTabela(g, null, top2); });
      }
    }
  } else {
    grupos.forEach(g => { html += buildTabela(g, null, top2); });
  }

  html += `<div class="footer-note">Fonte: FPF · Última atualização: ${upd}</div>`;
  app.innerHTML = html;
}

function trocarAba(aba, el) {
  abaAtual = aba;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('aba-classificacao').style.display = aba==='classificacao' ? '' : 'none';
  document.getElementById('aba-jogos').style.display        = aba==='jogos'          ? '' : 'none';
  document.getElementById('aba-ranking').style.display      = aba==='ranking'        ? '' : 'none';
  document.getElementById('aba-quartos').style.display      = aba==='quartos'        ? '' : 'none';
  document.getElementById('aba-matamata').style.display     = aba==='matamata'       ? '' : 'none';
  if (aba === 'matamata' && grupos.length) renderMataMata();
  if (aba === 'ranking'  && grupos.length) renderRanking();
  if (aba === 'quartos'  && grupos.length) renderQuartos();
  if (aba === 'jogos') {
    setupBuscaJogos();
    if (!dadosJogos) {
      carregarJogos(0);
    } else {
      if (!rodadaAtiva) rodadaAtiva = getRodadaAtual(dadosJogos.listData);
      renderJogos(rodadaAtiva);
    }
  }
}

function setupBusca() {
  const inp = document.getElementById('busca');
  const dd = document.getElementById('dropdown');
  const uniq = [...new Map(todosOsTimes.map(t=>[t.IdClube,t])).values()]
    .sort((a,b)=>a.NomePopularClube.localeCompare(b.NomePopularClube));

  inp.disabled = false;
  inp.placeholder = 'Buscar time...';

  inp.addEventListener('input', () => {
    const v = inp.value.trim().toLowerCase();
    if (v.length<2) { dd.classList.remove('open'); return; }
    const res = uniq.filter(t=>t.NomePopularClube.toLowerCase().includes(v));
    if (!res.length) { dd.classList.remove('open'); return; }
    dd.innerHTML = res.map(t => {
      const g = grupos.find(g=>g.times.some(x=>x.IdClube===t.IdClube));
      return `<div class="dd-item" data-id="${t.IdClube}">${t.NomePopularClube}<span>${g?.nome||''}</span></div>`;
    }).join('');
    dd.classList.add('open');
  });

  dd.addEventListener('click', e => {
    const item = e.target.closest('.dd-item');
    if (!item) return;
    clubeSelecionado = +item.dataset.id;
    inp.value = uniq.find(x=>x.IdClube===clubeSelecionado)?.NomePopularClube||'';
    dd.classList.remove('open');
    renderClassificacao();
    window.scrollTo({top:0,behavior:'smooth'});
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) dd.classList.remove('open');
  });

  inp.addEventListener('keydown', function(e) {
    if (e.key==='Escape') { inp.value=''; clubeSelecionado=null; dd.classList.remove('open'); renderClassificacao(); }
  });
}

/* ─── JOGOS ─── */
function setupBuscaJogos() {
  var inp = document.getElementById('busca-jogos');
  var dd = document.getElementById('dropdown-jogos');
  if (!inp || inp.dataset.bound) return;
  inp.dataset.bound = '1';

  inp.addEventListener('input', function() {
    var v = inp.value.trim().toLowerCase();
    if (v.length < 2) { dd.classList.remove('open'); return; }
    var uniq = [...new Map(todosOsTimes.map(function(t){ return [t.IdClube, t]; })).values()]
      .sort(function(a,b){ return a.NomePopularClube.localeCompare(b.NomePopularClube); });
    var res = uniq.filter(function(t){ return t.NomePopularClube.toLowerCase().includes(v); });
    if (!res.length) { dd.classList.remove('open'); return; }
    var g;
    dd.innerHTML = res.map(function(t) {
      g = grupos.find(function(gr){ return gr.times.some(function(x){ return x.IdClube === t.IdClube; }); });
      return '<div class="dd-item" data-id="' + t.IdClube + '" data-nome="' + t.NomePopularClube + '">'
        + t.NomePopularClube + '<span>' + (g ? g.nome : '') + '</span></div>';
    }).join('');
    dd.classList.add('open');
  });

  dd.addEventListener('click', function(e) {
    var item = e.target.closest('.dd-item');
    if (!item) return;
    timeFiltroJogos = item.dataset.nome;
    inp.value = timeFiltroJogos;
    dd.classList.remove('open');
    modoTodasRodadas = true;
    renderJogos(rodadaAtiva);
  });

  document.addEventListener('click', function(e) {
    if (!e.target.closest('.busca-jogos-wrap')) dd.classList.remove('open');
  }, true);

  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      inp.value = '';
      timeFiltroJogos = null;
      modoTodasRodadas = false;
      dd.classList.remove('open');
      renderJogos(rodadaAtiva);
    }
  });
}

function carregarJogos(rodada) {
  if (dadosJogos) {
    rodadaAtiva = rodada > 0 ? rodada : getRodadaAtual(dadosJogos.listData);
    renderJogos(rodadaAtiva);
    return;
  }
  var url = ENDPOINT + '?tipo=jogos&rodada=0&idClube=0';
  document.getElementById('jogos-content').innerHTML = '<div class="loading"><div class="spinner"></div>Buscando jogos...</div>';
  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(json){
      if (!json.Sucesso || !json.Retorno) throw new Error('Sem dados');
      dadosJogos = json.Retorno;
      dadosJogos.listTabela.forEach(function(j) {
        if (j.EscudoMandante) escudosMap['nome_' + j.NomePopularMandante] = j.EscudoMandante;
        if (j.EscudoVisitante) escudosMap['nome_' + j.NomePopularVisitante] = j.EscudoVisitante;
      });
      var rdAtiva = rodada > 0 ? rodada : getRodadaAtual(dadosJogos.listData);
      rodadaAtiva = rdAtiva;
      renderJogos(rdAtiva);
    })
    .catch(function(e){
      document.getElementById('jogos-content').innerHTML = '<div class="erro">❌ Erro ao carregar jogos: ' + e.message + '</div>';
    });
}

function getRodadaAtual(listData) {
  var hoje = new Date(); hoje.setHours(0,0,0,0);
  var found = null;
  listData.forEach(function(d){
    var p = d.Data.split('/');
    var dt = new Date(p[2], p[1]-1, p[0]);
    if (dt >= hoje && !found) found = d.Rodada;
  });
  return found || listData[listData.length-1].Rodada;
}

function isJogoFuturo(data) {
  var p = data.split('/');
  var dt = new Date(p[2], p[1]-1, p[0]); dt.setHours(23,59,59);
  return dt > new Date();
}

function isRodadaFutura(rodada, listData) {
  var hoje = new Date(); hoje.setHours(0,0,0,0);
  var datas = listData.filter(function(d){ return d.Rodada === rodada; });
  if (!datas.length) return false;
  var p = datas[0].Data.split('/');
  return new Date(p[2], p[1]-1, p[0]) > hoje;
}

function selecionarRodada(r) {
  modoTodasRodadas = false;
  rodadaAtiva = r;
  renderJogos(r);
}

function verTodasRodadas() {
  modoTodasRodadas = true;
  renderJogos(rodadaAtiva);
}

function limparBuscaJogos() {
  timeFiltroJogos = null;
  modoTodasRodadas = false;
  var inp = document.getElementById('busca-jogos');
  if (inp) inp.value = '';
  renderJogos(rodadaAtiva);
}

function renderJogos(rodadaSel) {
  if (!dadosJogos) return;
  var listRodada = dadosJogos.listRodada;
  var listTabela = dadosJogos.listTabela;
  var upd = listTabela[0] ? (listTabela[0].UltimaSincronizacaoData + ' ' + listTabela[0].UltimaSincronizacaoHora) : '';

  var timeNome = timeFiltroJogos || null;
  var modoTodas = modoTodasRodadas && timeNome;

  var html = '<div class="rodadas-nav">';
  listRodada.forEach(function(r){
    var rn = parseInt(r.Rodada);
    var fut = isRodadaFutura(rn, dadosJogos.listData);
    var cls = 'rodada-btn' + (!modoTodas && rn === rodadaSel ? ' active' : '') + (fut ? ' futura' : '');
    html += '<button class="' + cls + '" onclick="selecionarRodada(' + rn + ')">R' + r.Rodada + '</button>';
  });
  html += '</div>';

  if (timeNome) {
    html += '<div class="jogos-filtro-info">';
    html += '<span>📌 Jogos de <strong>' + timeNome + '</strong></span>';
    html += '<span style="display:flex;gap:8px;align-items:center">';
    if (!modoTodas) {
      html += '<button onclick="verTodasRodadas()" style="font-size:11px;color:var(--verde);background:none;border:none;cursor:pointer;font-weight:600">📅 Ver todas as rodadas</button>';
    } else {
      html += '<button onclick="selecionarRodada(rodadaAtiva)" style="font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;font-weight:600">← Ver rodada atual</button>';
    }
    html += '<button onclick="limparBuscaJogos()" style="font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;font-weight:600">✕ Limpar filtro</button>';
    html += '</span></div>';
  }

  var jogosParaExibir;
  if (modoTodas) {
    jogosParaExibir = listTabela.filter(function(j){
      return j.NomePopularMandante === timeNome || j.NomePopularVisitante === timeNome;
    });
    html += '<div class="rodada-titulo">Todos os jogos de ' + timeNome + ' &middot; ' + jogosParaExibir.length + ' partidas</div>';
  } else {
    jogosParaExibir = listTabela.filter(function(j){ return j.Rodada === rodadaSel; });
    html += '<div class="rodada-titulo">Rodada ' + rodadaSel + ' &middot; ' + jogosParaExibir.length + ' jogos</div>';
  }

  html += '<div class="jogos-grid">';

  var porData = {};
  jogosParaExibir.forEach(function(j){
    var p = j.Data.split('/');
    var dataSort = p[2] + '-' + p[1] + '-' + p[0];
    var chave = modoTodas ? (dataSort + '|R' + j.Rodada) : dataSort;
    if (!porData[chave]) porData[chave] = { rodada: j.Rodada, data: j.Data, diaSemana: j.DiaSemanaExtenso, jogos: [] };
    porData[chave].jogos.push(j);
  });

  Object.keys(porData).sort().forEach(function(chave){
    var grupo = porData[chave];
    if (modoTodas) {
      html += '<div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin:1rem 0 .4rem;padding-bottom:4px;border-bottom:1px solid var(--borda)">' + grupo.diaSemana + ', ' + grupo.data + ' &middot; Rodada ' + grupo.rodada + '</div>';
    }
    grupo.jogos.forEach(function(j){
      var futuro = isJogoFuturo(j.Data);
      var jogoDoTime = timeNome && (j.NomePopularMandante === timeNome || j.NomePopularVisitante === timeNome);
      html += '<div class="jogo-card' + (jogoDoTime ? ' destaque-jogo' : '') + '">';
      html += '<div class="jogo-header">';
      html += '<span>Grupo ' + j.Grupo + ' &middot; ' + j.DiaSemanaExtenso + ', ' + j.Data + (j.Horario ? ' &middot; ' + j.Horario : '') + '</span>';
      html += '<span>' + (futuro ? '<span class="badge-futuro">A jogar</span>' : '<span class="badge-passado">Encerrado</span>') + '</span>';
      html += '</div>';
      html += '<div class="jogo-body">';
      html += '<div class="jogo-time mandante">';
      if (j.EscudoMandante) html += '<img class="jogo-escudo" src="' + j.EscudoMandante + '" alt=""></img>';
      html += '<span class="jogo-nome">' + j.NomePopularMandante + '</span></div>';
      html += '<div class="jogo-placar">';
      if (futuro) {
        html += '<span class="placar-vazio">' + (j.Horario || 'A definir') + '</span>';
      } else {
        html += '<span class="placar-num">' + (j.ResultadoMandante !== null && j.ResultadoMandante !== undefined ? j.ResultadoMandante : '-') + '</span>';
        html += '<span class="placar-x">&#215;</span>';
        html += '<span class="placar-num">' + (j.ResultadoVisitante !== null && j.ResultadoVisitante !== undefined ? j.ResultadoVisitante : '-') + '</span>';
      }
      html += '</div>';
      html += '<div class="jogo-time visitante">';
      html += '<span class="jogo-nome">' + j.NomePopularVisitante + '</span>';
      if (j.EscudoVisitante) html += '<img class="jogo-escudo" src="' + j.EscudoVisitante + '" alt=""></img>';
      html += '</div></div>';
      if (j.Municipio) html += '<div class="jogo-info"><span>&#128205; ' + (j.NomePopularEstadio || '') + (j.Municipio ? ' &mdash; ' + j.Municipio : '') + '</span></div>';
      html += '</div>';
    });
  });

  html += '</div><div class="footer-note">Fonte: FPF &middot; Última atualização: ' + upd + '</div>';
  document.getElementById('jogos-content').innerHTML = html;
}

/* ─── CARGA INICIAL ─── */
async function carregar() {
  var ctrl = new AbortController();
  var timer = setTimeout(function(){ ctrl.abort(); }, 15000);
  try {
    const [resClassif, resJogos] = await Promise.all([
      fetch(ENDPOINT, { signal: ctrl.signal }),
      fetch(ENDPOINT + '?tipo=jogos&rodada=0&idClube=0')
    ]);
    clearTimeout(timer);

    if (!resClassif.ok) throw new Error('Proxy retornou ' + resClassif.status);
    const json = await resClassif.json();
    if (!json.Sucesso || !Array.isArray(json.Retorno) || !json.Retorno.length)
      throw new Error('Dados inválidos: ' + JSON.stringify(json).slice(0,100));

    todosOsTimes = json.Retorno;
    grupos = parseGrupos(todosOsTimes);

    var fase = todosOsTimes[0].NomeFase || '';
    var cat  = todosOsTimes[0].Categoria || '';
    var ano  = todosOsTimes[0].Exercicio || '';
    document.getElementById('titulo').textContent    = 'Paulista ' + cat + ' ' + ano;
    document.getElementById('subtitulo').textContent = fase + ' · ' + grupos.length + ' grupos · FPF';

    if (resJogos.ok) {
      resJogos.json().then(function(jj) {
        if (jj.Sucesso && jj.Retorno && jj.Retorno.listTabela) {
          dadosJogos = jj.Retorno;
          jj.Retorno.listTabela.forEach(function(j) {
            if (j.EscudoMandante) escudosMap['nome_' + j.NomePopularMandante] = j.EscudoMandante;
            if (j.EscudoVisitante) escudosMap['nome_' + j.NomePopularVisitante] = j.EscudoVisitante;
          });
          rodadaAtiva = getRodadaAtual(dadosJogos.listData);
          renderClassificacao();
        }
      }).catch(function(){});
    }

    setupBusca();
    renderClassificacao();

  } catch(err) {
    clearTimeout(timer);
    var msg = err.name === 'AbortError' ? 'Timeout — servidor demorou mais de 15s' : err.message;
    document.getElementById('app').innerHTML =
      '<div class="erro">❌ ' + msg + '<br><br>' +
      '<button onclick="location.reload()" style="margin-top:8px;padding:8px 20px;border-radius:8px;border:1px solid #ccc;cursor:pointer;font-size:14px">Tentar novamente</button></div>';
    document.getElementById('titulo').textContent = 'Erro ao carregar';
  }
}

/* ─── RANKING GERAL ─── */
function renderRanking() {
  const app = document.getElementById('ranking-content');
  if (!grupos.length) { app.innerHTML = '<div class="loading"><div class="spinner"></div>Aguardando dados...</div>'; return; }

  const top2ids = getTop2dos4os().map(t => t.IdClube);
  const upd = grupos[0]?.times[0]?.UltimaSincronizacao?.replace('T',' ').slice(0,16) || '';

  // Todos os times de todos os grupos ordenados
  const todos = grupos.flatMap(g => g.times.map(t => ({ ...t, grupo: g.nome })));
  todos.sort((a,b) => b.Pontos-a.Pontos || b.Vitorias-a.Vitorias || b.SaldoGols-a.SaldoGols || b.GolsPro-a.GolsPro);

  let html = `<div class="rank-intro">
    Classificação geral de todos os times somando pontos, vitórias, saldo de gols e gols pró.
    Os 3 primeiros de cada grupo e os 2 melhores 4ºs colocados avançam para a 2ª fase.
  </div>`;

  html += '<div class="rank-table-wrap"><table><thead><tr>';
  html += '<th style="width:36px">#</th><th style="text-align:left;min-width:160px">Time</th><th>Grupo</th>';
  html += '<th title="Pontos">P</th><th title="Jogos">J</th><th title="Vitórias">V</th><th title="Empates">E</th><th title="Derrotas">D</th>';
  html += '<th title="Gols Pró">GP</th><th title="Gols Contra">GC</th><th title="Saldo">SG</th>';
  html += '<th title="Vitórias Pênalti">VP</th></tr></thead><tbody>';

  let lastPts = -1, lastGroup = '';
  todos.forEach((t, i) => {
    const rank = i + 1;
    const pos = t.Classificacao;
    const isClassif = pos <= 3;
    const is4thTop2 = pos === 4 && top2ids.includes(t.IdClube);
    const is4thOut  = pos === 4 && !top2ids.includes(t.IdClube);

    // Separador de zona
    if (i === 0 && rank === 1) {
      html += `<tr><td colspan="12" class="rank-sep">🟢 Zona de classificação direta (1ºs–3ºs)</td></tr>`;
    }
    const firstNonClassif = !isClassif && todos[i-1]?.Classificacao <= 3;
    const firstTop2 = is4thTop2 && !todos[i-1]?.IdClube || (is4thTop2 && todos.slice(0,i).every(x => x.Classificacao <= 3));
    const firstOut = is4thOut && todos[i-1] && top2ids.includes(todos[i-1].IdClube);
    const firstElim = pos > 4 && todos[i-1]?.Classificacao <= 4;

    if (firstNonClassif && !is4thTop2 && !is4thOut) html += `<tr><td colspan="12" class="rank-sep">🟡 Fora da zona de classificação</td></tr>`;

    // Badge de posição
    let badge = '';
    if (rank === 1) badge = 'rp-gold';
    else if (rank === 2) badge = 'rp-silver';
    else if (rank === 3) badge = 'rp-bronze';
    else if (isClassif) badge = 'rp-classif';
    else if (is4thTop2) badge = 'rp-top2';
    else if (is4thOut) badge = 'rp-out';
    else badge = 'rp-normal';

    // Cor de fundo da linha
    let rowBg = '';
    if (isClassif) rowBg = i < 3 ? ['background:rgba(212,175,55,.08)','background:rgba(150,150,150,.07)','background:rgba(176,101,43,.08)'][i] : 'background:rgba(15,110,86,.06)';
    else if (is4thTop2) rowBg = 'background:rgba(24,95,165,.07)';
    else if (is4thOut) rowBg = 'background:rgba(186,117,23,.05)';

    const esc = getEscudo(t.NomePopularClube);
    const escImg = esc ? `<img src="${esc}" style="width:18px;height:18px;object-fit:contain;margin-right:5px;vertical-align:middle;border-radius:2px" onerror="this.style.display='none'" alt="">` : '';

    html += `<tr style="${rowBg}border-top:0.5px solid var(--borda)">
      <td style="text-align:center"><span class="rank-pos-badge ${badge}">${rank}</span></td>
      <td style="text-align:left;font-weight:600">${escImg}${t.NomePopularClube}</td>
      <td style="font-size:11px;color:var(--muted)">${t.grupo}</td>
      <td><strong>${t.Pontos}</strong></td>
      <td>${t.NumeroPartidas}</td>
      <td>${t.Vitorias}</td><td>${t.Empates}</td><td>${t.Derrota}</td>
      <td>${t.GolsPro}</td><td>${t.GolsContra}</td><td>${sg(t.SaldoGols)}</td>
      <td>${t.VitoriasPenaltis}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';

  // Legenda
  html += `<div class="legend" style="margin-top:.75rem">
    <div class="legend-item"><span class="rank-pos-badge rp-classif" style="width:14px;height:14px;font-size:9px"> </span>1º–3º de cada grupo: classificado</div>
    <div class="legend-item"><span class="rank-pos-badge rp-top2" style="width:14px;height:14px;font-size:9px"> </span>4º (top 2): classificado</div>
    <div class="legend-item"><span class="rank-pos-badge rp-out" style="width:14px;height:14px;font-size:9px"> </span>4º (fora do top 2)</div>
  </div>`;

  html += `<div class="footer-note">Fonte: FPF · Última atualização: ${upd}</div>`;
  app.innerHTML = html;
}

/* ─── RANKING DOS 4ºS ─── */
function renderQuartos() {
  const app = document.getElementById('quartos-content');
  if (!grupos.length) { app.innerHTML = '<div class="loading"><div class="spinner"></div>Aguardando dados...</div>'; return; }

  const upd = grupos[0]?.times[0]?.UltimaSincronizacao?.replace('T',' ').slice(0,16) || '';

  // Pegar o 4º de cada grupo
  const quartos = grupos
    .filter(g => g.times.length >= 4)
    .map(g => ({ ...g.times[3], grupo: g.nome }))
    .sort((a,b) => b.Pontos-a.Pontos || b.Vitorias-a.Vitorias || b.SaldoGols-a.SaldoGols || b.GolsPro-a.GolsPro);

  const totalGrupos = quartos.length;

  let html = `<div class="rank-intro">
    Disputa pelos <strong>2 melhores 4ºs colocados</strong> entre todos os grupos.
    Os 2 primeiros desta lista ganham uma vaga extra na 2ª fase.
    O critério de desempate segue o regulamento da FPF: Pontos → Vitórias → Saldo de Gols → Gols Pró.
  </div>`;

  quartos.forEach((t, i) => {
    const rank = i + 1;
    const isTop2 = rank <= 2;
    const isNext = rank === 3;

    let badge = isTop2 ? 'rp-top2' : (isNext ? 'rp-out' : 'rp-normal');
    const esc = getEscudo(t.NomePopularClube);
    const escImg = esc ? `<img src="${esc}" style="width:28px;height:28px;object-fit:contain;border-radius:4px" onerror="this.style.display='none'" alt="">` : '';

    const ptsProximo = quartos[rank] ? quartos[rank-1].Pontos - quartos[rank].Pontos : null;
    const difText = isTop2 && quartos[rank]
      ? `<span style="color:var(--verde);font-size:11px">+${quartos[rank-1].Pontos - quartos[rank].Pontos}pts à frente do ${rank+1}º</span>`
      : !isTop2 && quartos[i-1]
      ? `<span style="color:var(--red);font-size:11px">-${quartos[i-1].Pontos - t.Pontos}pts do ${i}º</span>`
      : '';

    // Separador entre top2 e fora
    if (rank === 3) {
      html += `<div style="display:flex;align-items:center;gap:10px;margin:1rem 0 .75rem">
        <div style="flex:1;height:2px;background:var(--borda)"></div>
        <span style="font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.05em">Fora da zona — ${totalGrupos - 2} times eliminados</span>
        <div style="flex:1;height:2px;background:var(--borda)"></div>
      </div>`;
    }

    html += `<div class="quarto-card ${isTop2 ? 'q-top' : ''}">
      <div class="quarto-header">
        <span>${t.grupo}</span>
        <span>${isTop2 ? '✅ Classificado para a 2ª fase' : isNext ? '⚠️ Próximo na fila' : '❌ Eliminado'}</span>
      </div>
      <div class="quarto-body">
        <div class="quarto-rank"><span class="rank-pos-badge ${badge}" style="width:34px;height:34px;font-size:15px">${rank}</span></div>
        ${escImg}
        <div class="quarto-info">
          <div class="quarto-nome">${t.NomePopularClube}</div>
          <div class="quarto-grupo">4º colocado do ${t.grupo} ${difText}</div>
        </div>
        <div class="quarto-pts">
          <div style="font-size:24px;font-weight:800;color:var(--accent)">${t.Pontos}</div>
          <div style="font-size:10px;color:var(--muted);text-align:right">pontos</div>
        </div>
      </div>
      <div class="quarto-stats">
        <span>⚽ ${t.Vitorias}V ${t.Empates}E ${t.Derrota}D</span>
        <span>🎯 ${t.GolsPro} gols pró</span>
        <span>📊 Saldo ${sg(t.SaldoGols)}</span>
        <span>🟨 ${t.CartoesAmarelos} CA · 🟥 ${t.CartoesVermelhos} CV</span>
      </div>
    </div>`;
  });

  html += `<div class="footer-note">Fonte: FPF · Última atualização: ${upd}</div>`;
  app.innerHTML = html;
}

carregar();
</script>
